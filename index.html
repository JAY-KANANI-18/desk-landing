    <!-- FAQ Schema (homepage) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "What is AxoDesk?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "AxoDesk is an omnichannel customer messaging platform that unifies WhatsApp, Instagram, Messenger, Email, and Live Chat into a single inbox. It includes AI automation, team collaboration tools, analytics, and CRM features."
          }
        },
        {
          "@type": "Question",
          "name": "How is AxoDesk different from respond.io or Sleekflow?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "AxoDesk offers a truly unified inbox with no-code automation, AI-powered agent, real-time analytics, and deeper integrations — all at a fraction of the cost. Unlike respond.io and Sleekflow, AxoDesk includes AI features and team collaboration in every plan."
          }
        },
        {
          "@type": "Question",
          "name": "Does AxoDesk support WhatsApp Business API?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. AxoDesk is an official WhatsApp Business Solution Provider (BSP), supporting the full WhatsApp Business API including message templates, broadcasts, automation and the WhatsApp Calling API."
          }
        },
        {
          "@type": "Question",
          "name": "Is there a free trial for AxoDesk?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes — AxoDesk offers a 14-day free trial with full access to all features on your chosen plan. No credit card required."
          }
        },
        {
          "@type": "Question",
          "name": "What industries does AxoDesk serve?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "AxoDesk serves businesses in e-commerce, retail, real estate, healthcare, education, finance, food & restaurant, automotive, and professional services — with tailored solutions for each industry."
          }
        }
      ]
    }
